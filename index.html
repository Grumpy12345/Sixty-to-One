<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Number Game: Sixty to One</title>
        <link href="style.css" rel="stylesheet">
    </head>
    
    <body>
      <div class="game-container">
        <div class="instructions">
            <p>Welcome to Sixty to One! When a button is pressed, if the current score is divisible by the number on the button, then the score is divided by the button number. Otherwise, the score is multiplied by the button number.</p>
        </div>

        <div class="score-display">
            <p id="score">60</p>
        </div>
        
        <div class="buttons">
            <button id="one">1</button>
            <button id="two">2</button>
            <button id="three">3</button>
            <button id="four">4</button>
            <button id="five">5</button>
            <button id="six">6</button>
        </div>

        <div class="reset-game">
            <button id="reset-btn">New Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
